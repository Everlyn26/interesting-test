<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 测测你是不是神仙好哥哥 💖</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  body{
    background:linear-gradient(135deg, #ffeaf5 0%, #fff5fc 100%);
    min-height:100vh;
    padding:20px;
  }

  /* 密码弹窗 */
  .lock{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.97);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
  }

  .lock-card{
    background:#fff;
    width:90%;
    max-width:380px;
    padding:40px 30px;
    border-radius:24px;
    box-shadow:0 8px 30px rgba(255, 105, 160, 0.15);
    text-align:center;
  }

  .lock-card h2{
    color:#ff6b9d;
    margin-bottom:6px;
    font-size:22px;
  }

  .lock-card p{
    color:#999;
    font-size:13px;
    margin-bottom:24px;
  }

  .lock-card input{
    width:100%;
    padding:14px 16px;
    border:1px solid #f0c9e1;
    border-radius:16px;
    font-size:15px;
    text-align:center;
    outline:none;
    margin-bottom:16px;
  }

  .lock-card input:focus{
    border-color:#ff6b9d;
  }

  .btn{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg, #ff6b9d, #ff8fb6);
    color:#fff;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }

  .btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(255,107,157,0.25);
  }

  /* 主卡片 */
  .container{
    max-width:420px;
    margin:30px auto;
    background:#fff;
    border-radius:28px;
    padding:32px 28px;
    box-shadow:0 10px 35px rgba(255,110,160,0.12);
    display:none;
  }

  .title-box{
    text-align:center;
    margin-bottom:30px;
  }

  .title-box h1{
    font-size:24px;
    color:#ff5a8c;
    margin-bottom:6px;
  }

  .title-box .sub{
    color:#888;
    font-size:13px;
  }

  /* 题目 */
  .item{
    margin-bottom:24px;
  }

  .q{
    font-weight:bold;
    color:#333;
    font-size:15px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:6px;
  }

  .q::before{
    content:"💭";
  }

  .opts{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .opt{
    background:#fdf2f7;
    border:1px solid #f8d5e6;
    border-radius:14px;
    padding:12px 16px;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
  }

  .opt:hover{
    background:#ffe6f0;
    border-color:#ff6b9d;
  }

  .opt input{
    margin-right:8px;
  }

  /* 结果 */
  .result{
    margin-top:30px;
    background:#fef5f9;
    border-radius:18px;
    padding:24px;
    text-align:center;
    display:none;
  }

  .result h3{
    color:#ff5a8c;
    font-size:18px;
    margin-bottom:8px;
  }

  .result .score{
    font-size:26px;
    font-weight:bold;
    color:#ff3a75;
    margin:6px 0;
  }

  .result .text{
    color:#555;
    font-size:14px;
    line-height:1.5;
  }

  .submit-box{
    text-align:center;
    margin-top:10px;
  }
</style>
</head>

<body>

<!-- 密码锁 -->
<div class="lock" id="lockBox">
  <div class="lock-card">
    <h2>💖 测测你是不是好哥哥</h2>
    <p>输入密码即可开始测试</p>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" onclick="unlock()">✅ 解锁开始</button>
  </div>
</div>

<!-- 测试页面 -->
<div class="container" id="main">

  <div class="title-box">
    <h1>💖 神仙好哥哥等级测试 💖</h1>
    <div class="sub">共5题，看看你有多宠妹妹～</div>
  </div>

  <!-- 1 -->
  <div class="item">
    <div class="q">妹妹说她有点不开心，你会？</div>
    <div class="opts">
      <label class="opt"><input type="radio" name="q1" value="0"> 关我啥事，自己冷静</label>
      <label class="opt"><input type="radio" name="q1" value="10"> 问问怎么了，简单安慰</label>
      <label class="opt"><input type="radio" name="q1" value="20"> 耐心哄+陪聊天，直到她开心</label>
    </div>
  </div>

  <!-- 2 -->
  <div class="item">
    <div class="q">妹妹半夜说饿了，你会？</div>
    <div class="opts">
      <label class="opt"><input type="radio" name="q2" value="0"> 熬夜吃啥，赶紧睡觉</label>
      <label class="opt"><input type="radio" name="q2" value="10"> 点个外卖，让她自己拿</label>
      <label class="opt"><input type="radio" name="q2" value="20"> 立马安排，送到她手边</label>
    </div>
  </div>

  <!-- 3 -->
  <div class="item">
    <div class="q">妹妹想要一支平价口红/小零食，你会？</div>
    <div class="opts">
      <label class="opt"><input type="radio" name="q3" value="0"> 乱花钱，不给买</label>
      <label class="opt"><input type="radio" name="q3" value="10"> 节日生日可以送</label>
      <label class="opt"><input type="radio" name="q3" value="20"> 喜欢就买，开心最重要</label>
    </div>
  </div>

  <!-- 4 -->
  <div class="item">
    <div class="q">妹妹打游戏又菜又爱玩，你会？</div>
    <div class="opts">
      <label class="opt"><input type="radio" name="q4" value="0"> 嫌弃吐槽，不想带</label>
      <label class="opt"><input type="radio" name="q4" value="10"> 勉强带一带，偶尔吐槽</label>
      <label class="opt"><input type="radio" name="q4" value="20"> 耐心保护，鼓励式带飞</label>
    </div>
  </div>

  <!-- 5 -->
  <div class="item">
    <div class="q">妹妹跟你吐槽别人，你会？</div>
    <div class="opts">
      <label class="opt"><input type="radio" name="q5" value="0"> 说她想多了，让她别计较</label>
      <label class="opt"><input type="radio" name="q5" value="10"> 一边听一边简单附和</label>
      <label class="opt"><input type="radio" name="q5" value="20"> 先站她这边，先哄情绪再讲道理</label>
    </div>
  </div>

  <div class="submit-box">
    <button class="btn" onclick="getResult()">🎉 查看我的哥哥等级</button>
  </div>

  <div class="result" id="result">
    <h3>✨ 你的好哥哥得分 ✨</h3>
    <div class="score" id="score">0</div>
    <div class="text" id="msg"></div>
  </div>

</div>

<script>
  // 你自己改密码
  const PASSWORD = "6688";

  // 解锁
  function unlock(){
    let v = document.getElementById("pwd").value.trim();
    if(v === PASSWORD){
      document.getElementById("lockBox").style.display = "none";
      document.getElementById("main").style.display = "block";
    }else{
      alert("❌ 密码不对哦，找卖家获取正确密码～");
    }
  }

  // 算分
  function getScore(name){
    let arr = document.getElementsByName(name);
    for(let i=0; i<arr.length; i++){
      if(arr[i].checked) return Number(arr[i].value);
    }
    return 0;
  }

  function getResult(){
    let s1 = getScore("q1");
    let s2 = getScore("q2");
    let s3 = getScore("q3");
    let s4 = getScore("q4");
    let s5 = getScore("q5");
    let total = s1 + s2 + s3 + s4 + s5;

    document.getElementById("score").innerText = total + " 分";
    let r = document.getElementById("msg");
    let txt = "";

    if(total >= 90){
      txt = "🥇 满级神仙哥哥！宠妹天花板，全网羡慕～";
    }else if(total >= 70){
      txt = "💕 超优质好哥哥，温柔细心，安全感拉满！";
    }else if(total >= 50){
      txt = "😊 及格普通哥哥，还算靠谱，继续加油～";
    }else{
      txt = "⚠️ 不合格哥哥！再不宠，妹妹就要跑啦～";
    }

    r.innerText = txt;
    document.getElementById("result").style.display = "block";
  }
</script>
</body>
</html>
